services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: frontend
    ports:
      - "3000:5173"
    networks:
      - canopiq_net
    volumes:                  # For hot reloading
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    networks:
      - canopiq_net
    restart: unless-stopped

networks:
  canopiq_net:
    driver: bridge
